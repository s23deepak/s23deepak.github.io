<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }} - {{ page.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 16px;
            line-height: 1.7;
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
        }
        header {
            background-color: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 0.75rem 0;
            text-align: center;
        }
        header h1 {
            margin: 0 0 0.5rem;
            font-size: 1.4rem;
            color: #f0f6fc;
            font-weight: 600;
        }
        nav {
            display: flex;
            justify-content: center;
            gap: 0.25rem;
        }
        nav a {
            color: #8b949e;
            text-decoration: none;
            padding: 0.35rem 0.8rem;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: background-color 0.2s, color 0.2s;
        }
        nav a:hover {
            background-color: #21262d;
            color: #f0f6fc;
        }
        main {
            max-width: 860px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }
        .content {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 2rem 2.5rem;
        }
        h1 { font-size: 2rem; color: #f0f6fc; margin-top: 0; }
        h2 { font-size: 1.3rem; color: #f0f6fc; border-bottom: 1px solid #21262d; padding-bottom: 0.4rem; margin-top: 2rem; }
        h3 { font-size: 1.1rem; color: #f0f6fc; }
        p { color: #c9d1d9; }
        em { color: #8b949e; }
        a { color: #58a6ff; text-decoration: none; }
        a:hover { text-decoration: underline; }
        hr {
            border: none;
            border-top: 1px solid #21262d;
            margin: 1.5rem 0;
        }
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0;
            font-size: 0.95rem;
        }
        th {
            background-color: #21262d;
            color: #f0f6fc;
            text-align: left;
            padding: 0.6rem 1rem;
            border: 1px solid #30363d;
        }
        td {
            padding: 0.6rem 1rem;
            border: 1px solid #30363d;
            color: #c9d1d9;
            vertical-align: top;
        }
        tr:nth-child(even) td { background-color: #161b22; }
        tr:nth-child(odd) td { background-color: #0d1117; }
        /* Code block / syntax highlighting styles (Rouge token classes) */
        .highlight {
            background: #0b1220;
            color: #cbd5e1;
            padding: 1rem;
            border-radius: 6px;
            border: 1px solid #30363d;
            overflow: auto;
            margin: 1rem 0;
            font-family: 'SFMono-Regular', 'Fira Code', Menlo, Monaco, monospace;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .highlight pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
        code {
            font-family: 'SFMono-Regular', 'Fira Code', Menlo, Monaco, monospace;
            font-size: 0.875em;
            background-color: #21262d;
            color: #c9d1d9;
            padding: 0.2em 0.4em;
            border-radius: 4px;
        }
        .highlight code { background: none; padding: 0; }
        /* Rouge token color mappings */
        .k  { color: #ff7b72; }
        .kd { color: #ff7b72; }
        .n  { color: #cbd5e1; }
        .na { color: #ffb86b; }
        .nb { color: #ffd580; }
        .nc { color: #7fffd4; }
        .nf { color: #82b1ff; }
        .nt { color: #7fffd4; }
        .nv { color: #9cd37b; }
        .v  { color: #9cd37b; }
        .o  { color: #cbd5e1; }
        .p  { color: #cbd5e1; }
        .m  { color: #ffd580; }
        .mi { color: #ffd580; }
        .mf { color: #ffd580; }
        .sh { color: #cbd5e1; }
        .s  { color: #f1fa8c; }
        .sa { color: #f1fa8c; }
        .sr { color: #f1fa8c; }
        .ss { color: #f1fa8c; }
        .c  { color: #7c8c99; font-style: italic; }
        .cm { color: #7c8c99; font-style: italic; }
        .cp { color: #7c8c99; font-style: italic; }
        .c1 { color: #7c8c99; font-style: italic; }
        /* Post list */
        .post-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .post-list li {
            padding: 0.6rem 0;
            border-bottom: 1px solid #21262d;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.25rem;
        }
        .post-list li:last-child { border-bottom: none; }
        .post-list a { font-size: 1rem; font-weight: 500; }
        .post-list .date { color: #8b949e; font-size: 0.85rem; }
        /* Stats image */
        .stats-img {
            display: block;
            max-width: 100%;
            margin: 1rem auto;
        }
        /* Social links */
        .social-links {
            display: flex;
            gap: 1.2rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }
        .social-links a { color: #8b949e; font-size: 0.95rem; }
        .social-links a:hover { color: #58a6ff; }
        footer {
            text-align: center;
            padding: 1.5rem 0;
            color: #484f58;
            font-size: 0.85rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ site.title }}</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/about">About</a>
        </nav>
    </header>
    <main>
        <div class="content">
            {{ content }}
        </div>
    </main>
    <footer>
        <p>&copy; 2025 {{ site.title }}</p>
    </footer>
</body>
</html>
